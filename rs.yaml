apiversio: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs 
  labels:
    app: myapp
spec:
  replica: 5
  selector:
    match labels:
      app: myapp
  template:
    metadata:
      labels: 
        app: myapp
  spec:
    containers:
    - name: mycont
      image: vaishnavigulhane19/studentapp
      containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: rs-svc
  labels:
    app: myapps
spec:
  type: NodePort
  selector: 
    app: myapp
  ports:
    - name: myportsvc
      protocol: TCP
      port: 80
      targetPort: 80
...

      
    
 
    
 
  
  
  
