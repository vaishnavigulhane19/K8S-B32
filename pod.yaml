apiVersion: v1
kind: Pod
metadata:
  name: pod1
  labels:
    app: myapp
    env: devops
spec:
  containers:
    - name: mycontainer
      image: nginx:latest
      ports:
        - name: nginx-port
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata: 
  name: cipod
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector: 
    app:myapp
  ports:
    - name: nginxcisvc
      Protocol: TCP
      port: 80
      targetport: 80
...
    