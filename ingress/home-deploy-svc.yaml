apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-deployment
  labels: 
    app: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template: 
  metadata:
    name: home-template
    labels:
      app: home
  spec:
    containers:
      - name: nginx-container
        image: nginx:latest
        ports:
          - name: myport
            containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: hone-svc
  app: home
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: home-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics: 
    - type: Resource
      resource:
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 40

