apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: mobile-deployment 
  labels: 
    app: mobile
spec: 
  replicas: 1
  selector: 
    matchLabels: 
      app: mobile
  template: 
    metadata: 
      name: mobile-template 
      labels: 
        app: mobile
    spec: 
      containers: 
        - name: httpd-container 
          image: httpd:latest
          ports: 
            - name: myport 
              containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: mobile-svc 
  labels: 
    app: mobile
spec: 
  type: ClusterIP 
  selector: 
    app: mobile
  ports: 
    - name: mobile-svc-port 
      protocol: TCP 
      port: 80
      targetPort: 80
...
---
apiVersion: autoscaling/v2 
kind: HorizontalPodAutoscaler 
metadata: 
  name: mobile-hpa 
  labels: 
    app: mobile
spec: 
  scaleTargetRef: 
    apiVersion: apps/v1 
    kind: Deployment 
    name: mobile-deployment
  minReplicas: 1
  maxReplicas: 5 
  metrics: 
  - type: Resource 
    resource: 
      name: cpu 
      target: 
        type: Utilization 
        averageUtilization: 40
...