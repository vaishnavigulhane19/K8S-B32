apiVersion: v1
kind: Pod
metadata:
  name: mypod
  labels: 
    app: myapp
spec:
  containers:
    - name: mycont
      image: nginx:latest
      ports:
        - name: myport
          containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myservice
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: myport
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30002
