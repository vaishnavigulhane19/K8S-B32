apiVersion: v1
kind: Podofci
metadata:
  name: mypod
  labels: 
    app: myapp
spec:
  containers:
    - name: mycont
      image: nginx:latest
      ports:
        - name: myport
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: myci
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector:
    app: myapp
  ports:
    protocol: TCP
    targetPort: 80
    port: 80
