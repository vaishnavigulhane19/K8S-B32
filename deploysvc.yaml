apiVersion: apps/v1
kind: Deployment
metadata:
  name: myru
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp
  strategy:
    type: RollingUpdate
    rollingupdate:
      maxsurge: 1
      maxunavailable: 1
template:
  metadata:
    name: mypod
    labels:
      app: myapp 
  spec:
    containers:
      - name: mycont
        image: nginx:latest
        ports:
          - name: myport
            containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata: 
  name: mysvcnp
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: myport
      protocol: TCP
      port: 80
      targetPort: 80
...