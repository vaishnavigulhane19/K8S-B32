apiVersion: v1
kind: ReplicationController
metadata:
  name: my-rc
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
    containers:
      - name: nginx-cont
        image: nginx:latest
        ports:
        - name: myport
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: rc-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: myportsvc
      protocol: TCP
      port: 80
      targetPort: 80
...