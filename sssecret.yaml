apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysset
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: mytemp
      labels:
        app: myapp
    spec:
      containers:
        - name: mycont
          image: mysql:8.0
          ports:
            - name: myport
              containerPort: 3306
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysecret
                  key: MYSQL_USER

            - name: MYSQL_PASSWORD
              valueFrom: 
                secretKeyRef:
                  name: mysecret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysecret
                  key: MYSQL_ROOT_PASSWORD
                  
---
apiVersion: v1
kind: Service
metadata:
  name: mysvc
  labels:
    app: myapp
spec:
  clusterIP: None
  selector:
    app: myapp
  ports:
    - name: myport
      protocol: TCP
      port: 3306
      targetPort: 3306
