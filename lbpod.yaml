apiVersion: v1
kind: Pod
metadata:
  name: lbpod
  labels:
    app: lbpod
spec: 
  containers:
    - name: nginx-cont
      image: nginx:latest
      ports:
        - name: nginxport
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  - name: lbpod-service
    labels:
      app: lbpod
spec:
  type: LoadBalancer
  selector:
    app: lbpod
  ports:
    - name: nginxsvclb
      protocol: TCP
      port: 80
      targetPort: 80          
